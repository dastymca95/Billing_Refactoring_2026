name: Billing V2 CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: billing-v2-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  INNER_VIEW_TEST_ASSET_ROOT: webapp/backend/tests/fixtures/runtime_assets
  INNER_VIEW_CI: "1"
  INNER_VIEW_DEPLOYMENT_MODE: local
  INNER_VIEW_TENANT_ID: ci-test
  AI_ASSIST_ENABLED: "false"
  AI_FALLBACK_ENABLED: "false"
  AI_FALLBACK_DISABLED: "1"
  AI_SEMANTIC_REASONING_ENABLED: "false"
  AI_PROVIDER: disabled
  AI_VISION_PROVIDER: disabled
  AI_VERIFICATION_PROVIDER: disabled
  AI_ACCOUNTING_REASONING_PROVIDER: disabled

jobs:
  repository-safety:
    name: Repository safety
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check whitespace in the worktree and changed commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          git diff --check
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --check "${BASE_SHA}...${GITHUB_SHA}"
          fi

      - name: Scan tracked repository without exposing values
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python scripts/ci_repository_safety.py --base "$BASE_SHA"

  backend:
    name: Backend
    needs: repository-safety
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Compile backend
        run: python -m compileall -q webapp/backend

      - name: Verify backend test discovery lower bound
        run: python scripts/ci_verify_discovery.py backend --minimum 432

      - name: Run full backend suite
        run: python -m pytest -q webapp/backend/tests

  frontend:
    name: Frontend
    needs: repository-safety
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: webapp/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node 24 with npm cache
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Install locked frontend dependencies
        run: npm ci

      - name: Build TypeScript and Vite production bundle
        run: npm run build

  active-e2e:
    name: Active Billing V2 E2E
    needs: [repository-safety, backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11 with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node 24 with npm cache
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Install deterministic test dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          npm ci --prefix webapp/frontend
          npx --prefix webapp/frontend playwright install --with-deps chromium

      - name: Verify active discovery and run 14 browser gates
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5174
          VITE_BACKEND_PORT: "8001"
        run: |
          mkdir -p ci-logs
          python -m uvicorn webapp.backend.main:app \
            --host 127.0.0.1 --port 8001 --log-level warning --no-access-log \
            > ci-logs/backend.log 2>&1 &
          BACKEND_PID=$!
          pushd webapp/frontend >/dev/null
          node node_modules/vite/bin/vite.js --host 127.0.0.1 --port 5174 --strictPort \
            > ../../ci-logs/frontend.log 2>&1 &
          FRONTEND_PID=$!
          popd >/dev/null
          cleanup() {
            kill "$FRONTEND_PID" "$BACKEND_PID" 2>/dev/null || true
            wait "$FRONTEND_PID" "$BACKEND_PID" 2>/dev/null || true
          }
          trap cleanup EXIT
          python - <<'PY'
          import time
          import urllib.request

          urls = (
              "http://127.0.0.1:8001/api/health",
              "http://127.0.0.1:5174/",
              "http://127.0.0.1:5174/api/health",
          )
          deadline = time.monotonic() + 60
          pending = set(urls)
          while pending and time.monotonic() < deadline:
              for url in tuple(pending):
                  try:
                      with urllib.request.urlopen(url, timeout=2) as response:
                          if response.status == 200:
                              pending.remove(url)
                  except OSError:
                      pass
              if pending:
                  time.sleep(0.25)
          if pending:
              raise SystemExit("test services did not become healthy: " + ", ".join(sorted(pending)))
          PY
          python scripts/ci_verify_discovery.py active --expected 14
          npm --prefix webapp/frontend run test:e2e:active -- --reporter=list

      - name: Upload safe service logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: billing-v2-safe-service-logs-${{ github.run_id }}
          path: |
            ci-logs/backend.log
            ci-logs/frontend.log
          if-no-files-found: ignore
          retention-days: 5

  legacy-discovery:
    name: Legacy E2E discovery
    needs: [repository-safety, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node 24 with npm cache
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Install locked frontend dependencies
        run: npm ci --prefix webapp/frontend

      - name: Verify 41 legacy tests and 10 sanitized U4 cases
        run: python scripts/ci_verify_discovery.py legacy --expected 41 --expected-u4 10
