# ============================================================================
# GENERAL LEDGER REFERENCE
# Generated from Gl Codes/General Ledger Report.csv (transactional data)
# and Gl Codes/Chart Of Accounts.csv (validation reference).
# This file is REGENERATABLE; manual edits will be lost on re-generation.
# ============================================================================

metadata:
  generated_from: "Gl Codes/General Ledger Report.csv"
  supporting_files:
    - "Gl Codes/Chart Of Accounts.csv"
    - "Properties/Properties.csv"
  generated_at: "2026-05-01"
  purpose: |
    Summary of historical accounting behavior, used to prefill vendor
    accounting_mapping rules. Read by humans for review; not read by the
    Python billing scripts directly.
  warning: |
    Counts here are based on rows with GL Accounts.Type in
    {Expense, Non-Operating Expense, Fixed Asset} only. Cash, AP, AR,
    and Credit Card clearing rows are excluded so that the most_common_gl_code
    reflects the EXPENSE side of each transaction (where vendor billing rules
    are applied), not the cash/credit-card clearing side.

