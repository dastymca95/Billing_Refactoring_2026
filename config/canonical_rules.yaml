categories:
  utilities:
    labels:
    - Utilities
    vendor_keywords:
    - utility
    - utilities
    - water
    - electric
    - wastewater
    - fiber
    - internet
    - gas
    - power
    service_keywords:
    - water
    - sewer
    - electric
    - internet
    - fiber
    - gas
    - wastewater
    default_gl_candidates:
      water: '6955'
      sewer: '6955'
      wastewater: '6955'
      internet: '6920'
      fiber: '6920'
      electric: '6950'
      gas: '6995'
    invoice_number_rule: account_number_service_period
    location_policy: valid_unit_if_present
  pest_control:
    labels:
    - Pest Control
    vendor_keywords:
    - pest
    - termite
    - exterminator
    default_gl_candidates:
      default: '6760'
    location_policy: property_level_blank_location_allowed
  landscaping:
    labels:
    - Landscaping
    vendor_keywords:
    - landscap
    - lawn
    - mulch
    - tree
    default_gl_candidates:
      default: '6750'
    location_policy: property_level_blank_location_allowed
  marketing:
    labels:
    - Marketing
    vendor_keywords:
    - marketing
    - advertising
    - apartments.com
    - costar
    default_gl_candidates:
      default: '6630'
    location_policy: property_level_blank_location_allowed
  subscriptions:
    labels:
    - Subscriptions
    - Suscriptions
    vendor_keywords:
    - subscription
    - software
    - license
    - saas
    default_gl_candidates:
      default: '6665'
    location_policy: property_level_blank_location_allowed
  trash_collection_services:
    labels:
    - Trash collections services
    vendor_keywords:
    - waste
    - trash
    - garbage
    - refuse
    - dumpster
    - capital waste
    - waste connections
    service_keywords:
    - trash
    - waste
    - container
    - dumpster
    - fuel recovery
    - removal
    default_gl_candidates:
      default: '6940'
      fuel_recovery: '6940'
      environmental: '6940'
    fee_handling:
      fuel_recovery_adjustment: same_gl_as_service
    ignore_line_keywords:
    - previous balance
    - balance forward
    - payment received
    - autopay
    - amount enclosed
    location_policy: property_level_blank_location_allowed
  other_infrequent:
    labels:
    - Other infrequent / maintenance / supplies / purchases
    - Other unfrequent like (manintenance, supplies purchases, punctual services, atorny, appliances, etc tools)
    vendor_keywords:
    - supply
    - supplies
    - maintenance
    - repair
    - materials
    - appliance
    - parts
    use_ai: true
    require_vendor_validation: true
    require_gl_validation: true
    location_policy: valid_unit_if_present
  unknown:
    labels:
    - Unknown
    vendor_keywords: []
    use_ai: true
    location_policy: valid_unit_if_present
utility_processing:
  required_fields:
  - invoice_number
  - bill_or_credit
  - invoice_date
  - accounting_date
  - vendor
  - invoice_description
  - line_item_number
  - property_abbreviation
  - gl_account
  - line_item_description
  - amount
  - expense_type
  - is_replacement_reserve
  - due_date
  invoice_number:
    utilities_default:
      format: '{account_number} {service_month_abbrev_title} {service_year_yy}'
      example: 341340.0094 Apr 26
    explicit_invoice_number:
      use_only_when_vendor_rule_says_so: true
  bill_or_credit:
    default: Bill
    credit_keywords:
    - credit
    - credit memo
    - refund
    - adjustment credit
  accounting_date:
    default: same_as_invoice_date
  expense_type:
    default: General
  is_replacement_reserve:
    default: false
  location:
    source: Unit Info Clean valid unit/location only
    never_raw_address: true
    allow_blank_for_property_level_service: true
  tax_handling:
    default: allocate_proportionally
    never_create_standalone_tax_line: true
    rounding: apply_remainder_to_largest_taxable_line
  fees:
    connection_fee:
      gl_account: '6956'
      keywords:
      - connect fee
      - connection fee
      - reconnection fee
      - reconnect fee
      - recon chg
      - reconnection charge
      - reconnect charge
      - service connection
      - new service fee
      - connection charge
      - turn on fee
      - activation fee
      behavior: separate_line_force_gl_6956
    late_fee:
      never_use_connect_fee_gl: true
      default_behavior: attach_to_underlying_service_or_vendor_default
      keywords:
      - late fee
      - late charge
      - late payment charge
      - past due fee
      - penalty
    balance_forward:
      include_if_current_payable_and_vendor_rule_allows: true
      never_include_payments_as_expense: true
  gl_mapping:
    valid_numeric_only: true
    defaults:
      electric_common: '6915'
      electric_vacant: '6920'
      water_sewer: '6955'
      stormwater: '6995'
      internet_fiber: '6960'
      cable_tv: '6905'
      trash: '6940'
      sanitation: '6940'
      fire_protection_service: '6860'
      connect_fee: '6956'
  line_classification:
    priority:
    - payment_and_previous_balance_exclusions
    - connection_reconnection_fee
    - late_fee
    - tax_fee
    - fire_protection_service
    - trash_sanitation_service
    - specific_utility_service_type
    - other_fee_or_unknown
    electricity_keywords:
    - electric
    - electricity
    - kwh
    - power
    - demand
    gas_keywords:
    - gas
    - therm
    - natural gas
    water_keywords:
    - water
    - sewer
    - wastewater
    - stormwater
    fire_protection_keywords:
    - fire detection
    - fire protection
    - fire service
    - private fire
    - fire line
    - sprinkler
    - sprinkler service
    - detector check
    - fire meter
