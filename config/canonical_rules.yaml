template_requirements:
  required_columns:
  - Invoice Number
  - Bill or Credit
  - Invoice Date
  - Accounting Date
  - Vendor
  - Invoice Description
  - Line Item Number
  - Property Abbreviation
  - GL Account
  - Line Item Description
