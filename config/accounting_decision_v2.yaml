ranking_weights:
  semantic_compatibility: 0.35
  trade_match: 0.20
  work_mode_match: 0.15
  specificity: 0.10
  deterministic_rule_support: 0.10
  historical_support: 0.05
  vendor_support: 0.03
  property_policy: 0.02
  contradiction_penalty: -0.25

thresholds:
  minimum_selectable_score: 0.45
  minimum_top_1_margin: 0.08
  high_confidence: 0.80
  medium_confidence: 0.60
  blocking_ambiguity: 0.04

